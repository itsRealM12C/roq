<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoQ Extractor</title>
<script src="coi-serviceworker.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0d0d;
  --surface: #111;
  --border:  #222;
  --accent:  #e8ff00;
  --green:   #00e676;
  --red:     #ff3c3c;
  --text:    #ccc;
  --dim:     #444;
  --font:    'IBM Plex Mono', monospace;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px 60px;
}

.wrap { width: 100%; max-width: 680px; }

/* ── Header ── */
header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 32px;
}
h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
h1 em { color: var(--accent); font-style: normal; }
.tag {
  font-size: 10px;
  color: var(--dim);
  border: 1px solid var(--border);
  padding: 2px 7px;
  letter-spacing: 0.1em;
}

/* ── Drop zone ── */
#drop {
  border: 1px dashed #333;
  background: var(--surface);
  padding: 60px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
  margin-bottom: 24px;
  user-select: none;
}
#drop:hover, #drop.over {
  border-color: var(--accent);
  background: rgba(232,255,0,0.02);
}
#drop.hidden { display: none; }
#drop .big { font-size: 36px; margin-bottom: 14px; display: block; }
#drop .primary { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 6px; }
#drop .secondary { font-size: 12px; color: var(--dim); }
#file-input { display: none; }

/* ── Progress / status ── */
#status {
  display: none;
  margin-bottom: 24px;
}
#status.show { display: block; }

.status-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 2px;
}
.status-icon { font-size: 18px; flex-shrink: 0; }
.status-text { flex: 1; }
.status-title { color: #fff; font-weight: 600; font-size: 13px; }
.status-sub   { color: var(--dim); font-size: 11px; margin-top: 2px; }

#prog-bar-wrap {
  height: 3px;
  background: var(--border);
  margin-bottom: 2px;
}
#prog-bar {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.25s ease;
  box-shadow: 0 0 8px rgba(232,255,0,0.5);
}

#log-box {
  background: #080808;
  border: 1px solid var(--border);
  border-top: none;
  padding: 8px 12px;
  max-height: 80px;
  overflow-y: auto;
  font-size: 11px;
  line-height: 1.7;
  color: var(--dim);
  scrollbar-width: thin;
}

/* ── Video output ── */
#output {
  display: none;
  margin-bottom: 20px;
}
#output.show { display: block; }

#video-wrap {
  background: #000;
  border: 1px solid var(--border);
  position: relative;
  margin-bottom: 2px;
  line-height: 0;
}
#video-wrap video {
  width: 100%;
  display: block;
  max-height: 420px;
}

/* ── Actions bar ── */
#actions {
  display: flex;
  gap: 2px;
  margin-bottom: 24px;
}
.action-btn {
  flex: 1;
  padding: 11px 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.12s;
  text-align: center;
}
.action-btn:hover { border-color: #444; color: #fff; }
.action-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
.action-btn.primary:hover { opacity: 0.88; }

/* ── Format strip ── */
#fmt-strip {
  display: none;
  gap: 2px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
#fmt-strip.show { display: flex; }
.fmt-chip {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--dim);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.1s;
  letter-spacing: 0.08em;
}
.fmt-chip:hover { border-color: #555; color: var(--text); }
.fmt-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,0,0.06); }

/* ── Reset ── */
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>RoQ<em>.</em>Extractor</h1>
    <span class="tag">ffmpeg.wasm</span>
  </header>

  <!-- Drop zone -->
  <div id="drop">
    <span class="big">🎬</span>
    <div class="primary">Drop a .roq file to convert</div>
    <div class="secondary">id Software RoQ &nbsp;·&nbsp; auto-converts to MP4</div>
    <input type="file" id="file-input" accept=".roq,.RoQ">
  </div>

  <!-- Status / progress -->
  <div id="status">
    <div class="status-row">
      <span class="status-icon" id="s-icon">⏳</span>
      <div class="status-text">
        <div class="status-title" id="s-title">Loading…</div>
        <div class="status-sub"  id="s-sub"></div>
      </div>
    </div>
    <div id="prog-bar-wrap"><div id="prog-bar"></div></div>
    <div id="log-box"></div>
  </div>

  <!-- Video output -->
  <div id="output">
    <div id="video-wrap">
      <video id="video" controls playsinline></video>
    </div>
  </div>

  <!-- Download + other format buttons -->
  <div id="actions" style="display:none">
    <button class="action-btn primary" id="dl-btn">⬇ Download MP4</button>
    <button class="action-btn" id="other-fmt-btn">Other formats ▾</button>
    <button class="action-btn" id="new-file-btn">New file</button>
  </div>

  <!-- Format picker (hidden until "Other formats" clicked) -->
  <div id="fmt-strip">
    <div class="fmt-chip" data-ext="webm" data-args="-c:v libvpx -crf 10 -b:v 0 -c:a libvorbis">WebM</div>
    <div class="fmt-chip" data-ext="avi"  data-args="-c:v libx264 -c:a pcm_s16le">AVI</div>
    <div class="fmt-chip" data-ext="gif"  data-args="-vf fps=15,scale=320:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse -loop 0">GIF (320p)</div>
    <div class="fmt-chip" data-ext="wav"  data-args="-vn -c:a pcm_s16le">WAV audio</div>
    <div class="fmt-chip" data-ext="mp3"  data-args="-vn -c:a libmp3lame -q:a 2">MP3 audio</div>
    <div class="fmt-chip" data-ext="png"  data-args="-frames:v 1">PNG (1st frame)</div>
  </div>


</div>

<script>
// ── Elements ───────────────────────────────────────────────────────────────
const drop       = document.getElementById('drop');
const fileInput  = document.getElementById('file-input');
const statusEl   = document.getElementById('status');
const sIcon      = document.getElementById('s-icon');
const sTitle     = document.getElementById('s-title');
const sSub       = document.getElementById('s-sub');
const progBar    = document.getElementById('prog-bar');
const logBox     = document.getElementById('log-box');
const outputEl   = document.getElementById('output');
const videoEl    = document.getElementById('video');
const actionsEl  = document.getElementById('actions');
const dlBtn      = document.getElementById('dl-btn');
const otherFmt   = document.getElementById('other-fmt-btn');
const newFileBtn = document.getElementById('new-file-btn');
const fmtStrip   = document.getElementById('fmt-strip');

// ── State ──────────────────────────────────────────────────────────────────
let ffmpeg = null, fetchFile = null, ffmpegReady = false;
let currentBlobUrl = null;
let currentExt = 'mp4';

// ── Helpers ────────────────────────────────────────────────────────────────
function setStatus(icon, title, sub) {
  statusEl.classList.add('show');
  sIcon.textContent  = icon;
  sTitle.textContent = title;
  sSub.textContent   = sub || '';
}

function setProgress(r) {
  progBar.style.width = Math.min(100, r * 100).toFixed(1) + '%';
}

function addLog(msg) {
  const d = document.createElement('div');
  d.textContent = msg;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
}

function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(2) + ' MB';
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload  = res;
    s.onerror = () => rej(new Error('Failed to load ' + src));
    document.head.appendChild(s);
  });
}

// ── Load ffmpeg.wasm ───────────────────────────────────────────────────────
async function initFFmpeg() {
  setStatus('⏳', 'Loading ffmpeg.wasm…', 'First load ~25 MB, cached after');
  addLog('Loading ffmpeg.wasm from CDN…');
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js');
    const { createFFmpeg: cFF, fetchFile: fF } = window.FFmpeg;
    fetchFile = fF;
    ffmpeg = cFF({
      log: true,
      corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
      progress: ({ ratio }) => setProgress(ratio),
      logger: ({ message }) => {
        if (/frame=|time=|speed=/.test(message)) addLog(message.trim());
      }
    });
    await ffmpeg.load();
    ffmpegReady = true;
    addLog('ffmpeg.wasm ready.');
  } catch(e) {
    setStatus('❌', 'Failed to load ffmpeg.wasm', e.message);
    addLog('ERROR: ' + e.message);
    throw e;
  }
}

// ── Convert ────────────────────────────────────────────────────────────────
async function convert(file, ext, args) {
  ext  = ext  || 'mp4';
  args = args || '-c:v libx264 -preset fast -crf 20 -c:a aac -movflags +faststart';

  drop.classList.add('hidden');
  statusEl.classList.add('show');
  outputEl.classList.remove('show');
  actionsEl.style.display = 'none';
  fmtStrip.classList.remove('show');
  setProgress(0);
  logBox.innerHTML = '';

  if (!ffmpegReady) {
    try { await initFFmpeg(); }
    catch(e) { return; }
  }

  const baseName = file.name.replace(/\.roq$/i, '');
  const outName  = baseName + '.' + ext;

  setStatus('⚙️', 'Converting ' + file.name + '…', 'to ' + ext.toUpperCase());
  addLog('Input: ' + file.name + ' (' + fmtBytes(file.size) + ')');

  try {
    ffmpeg.FS('writeFile', 'input.roq', await fetchFile(file));
  } catch(e) {
    setStatus('❌', 'Failed to read file', e.message); return;
  }

  const argArr = ['-i', 'input.roq', ...args.split(' ').filter(Boolean), outName];
  addLog('ffmpeg ' + argArr.join(' '));

  try {
    await ffmpeg.run(...argArr);
  } catch(e) {
    setStatus('❌', 'Conversion failed', e.message);
    addLog('ERROR: ' + e.message); return;
  }

  let data;
  try {
    data = ffmpeg.FS('readFile', outName);
  } catch(e) {
    setStatus('❌', 'No output produced', 'ffmpeg may have errored — check log');
    return;
  }

  const mimes = {
    mp4:'video/mp4', webm:'video/webm', avi:'video/x-msvideo',
    gif:'image/gif', mov:'video/quicktime', wav:'audio/wav',
    mp3:'audio/mpeg', png:'image/png'
  };
  const blob = new Blob([data.buffer], { type: mimes[ext] || 'application/octet-stream' });
  if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
  currentBlobUrl = URL.createObjectURL(blob);
  currentExt = ext;

  // Cleanup FS
  try { ffmpeg.FS('unlink', 'input.roq'); } catch(_){}
  try { ffmpeg.FS('unlink', outName);     } catch(_){}

  setStatus('✅', 'Done — ' + outName, fmtBytes(blob.size));
  setProgress(1);

  // Show video / image
  if (['mp4','webm','avi','mov'].includes(ext)) {
    videoEl.src = currentBlobUrl;
    videoEl.style.display = 'block';
    document.getElementById('video-wrap').querySelector('img')?.remove();
    outputEl.classList.add('show');
    videoEl.play().catch(()=>{});
  } else if (ext === 'gif' || ext === 'png') {
    videoEl.style.display = 'none';
    const img = document.createElement('img');
    img.src = currentBlobUrl;
    img.style.cssText = 'width:100%;display:block;';
    const vw = document.getElementById('video-wrap');
    vw.querySelector('img')?.remove();
    vw.appendChild(img);
    outputEl.classList.add('show');
  } else {
    // audio-only: just show actions
    videoEl.style.display = 'none';
    outputEl.classList.remove('show');
  }

  // Update download button
  dlBtn.textContent = '⬇ Download ' + ext.toUpperCase();
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = currentBlobUrl;
    a.download = outName;
    a.click();
  };

  actionsEl.style.display = 'flex';
  
}

// ── Drop / file pick ───────────────────────────────────────────────────────
drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) go(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) go(e.target.files[0]); });

function go(file) {
  if (!file.name.match(/\.roq$/i)) {
    alert('Please drop a .roq file'); return;
  }
  convert(file);
}

// ── Format chips ───────────────────────────────────────────────────────────
let lastFile = null;
const origGo = go;

// Override to remember last file
drop.addEventListener('drop', e => { lastFile = e.dataTransfer.files[0]; }, true);
fileInput.addEventListener('change', e => { lastFile = e.target.files[0]; }, true);
// Patch convert caller to store file
const _convert = convert;
window.go = function(file) {
  lastFile = file;
  if (!file.name.match(/\.roq$/i)) { alert('Please drop a .roq file'); return; }
  _convert(file);
};
drop.onclick = () => fileInput.click();

document.querySelectorAll('.fmt-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    if (!lastFile) return;
    document.querySelectorAll('.fmt-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    _convert(lastFile, chip.dataset.ext, chip.dataset.args);
  });
});

// ── Other formats toggle ───────────────────────────────────────────────────
otherFmt.addEventListener('click', () => {
  const open = fmtStrip.classList.toggle('show');
  otherFmt.textContent = open ? 'Other formats ▴' : 'Other formats ▾';
});

// ── New file / Reset ───────────────────────────────────────────────────────
function reset() {
  drop.classList.remove('hidden');
  statusEl.classList.remove('show');
  outputEl.classList.remove('show');
  actionsEl.style.display = 'none';
  fmtStrip.classList.remove('show');
  videoEl.src = '';
  progBar.style.width = '0%';
  logBox.innerHTML = '';
  fileInput.value = '';
  lastFile = null;
  document.querySelectorAll('.fmt-chip').forEach(c => c.classList.remove('active'));
}

newFileBtn.addEventListener('click', reset);

// ── Drop on whole page ─────────────────────────────────────────────────────
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.name.match(/\.roq$/i)) { reset(); setTimeout(() => window.go(f), 50); }
});
</script>
</body>
</html>
