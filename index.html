<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoQ Extractor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0d0d;
  --surface: #151515;
  --border:  #2a2a2a;
  --accent:  #e8ff00;
  --red:     #ff3c3c;
  --green:   #00e676;
  --text:    #d0d0d0;
  --dim:     #555;
  --font: 'IBM Plex Mono', monospace;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

body {
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 16px 64px; min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 0%, rgba(232,255,0,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(232,255,0,0.03) 0%, transparent 40%);
}

.wrap { width: 100%; max-width: 620px; }

header { margin-bottom: 40px; display: flex; align-items: baseline; gap: 16px; }
header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
header h1 span { color: var(--accent); }
.ver { font-size: 11px; color: var(--dim); letter-spacing: 0.1em; border: 1px solid var(--border); padding: 2px 6px; }

#drop {
  border: 1px solid var(--border); background: var(--surface);
  padding: 56px 24px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s; position: relative; margin-bottom: 24px;
}
#drop.over { border-color: var(--accent); background: rgba(232,255,0,0.03); }
#drop .icon { font-size: 32px; margin-bottom: 16px; display: block; opacity: 0.7; }
#drop .label { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 6px; }
#drop .hint { color: var(--dim); font-size: 12px; }
#file { display: none; }

#drop::before, #drop::after, .drop-br::before, .drop-br::after {
  content: ''; position: absolute; width: 14px; height: 14px;
  border-color: var(--accent); border-style: solid; opacity: 0.4;
}
#drop::before  { top: 8px; left: 8px;    border-width: 1px 0 0 1px; }
#drop::after   { top: 8px; right: 8px;   border-width: 1px 1px 0 0; }
.drop-br::before { bottom: 8px; left: 8px;  border-width: 0 0 1px 1px; }
.drop-br::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
.drop-br { position: absolute; inset: 0; pointer-events: none; }

#log-wrap { display: none; margin-bottom: 20px; }
#log-wrap.show { display: block; }
.log-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: var(--surface);
  border: 1px solid var(--border); border-bottom: none;
}
.log-header span { font-size: 11px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; }
#log {
  background: #0a0a0a; border: 1px solid var(--border); padding: 12px;
  max-height: 160px; overflow-y: auto; font-size: 12px; line-height: 1.7;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.l-ok   { color: var(--green); }
.l-info { color: var(--text); }
.l-warn { color: #ffb300; }
.l-err  { color: var(--red); }
.l-dim  { color: var(--dim); }

#prog-wrap { height: 2px; background: var(--border); margin-bottom: 24px; display: none; }
#prog-wrap.show { display: block; }
#prog { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s ease; box-shadow: 0 0 8px rgba(232,255,0,0.6); }

#info-wrap { display: none; margin-bottom: 24px; }
#info-wrap.show { display: flex; gap: 0; flex-wrap: wrap; border: 1px solid var(--border); }
.info-cell { flex: 1 1 50%; padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: 8px; }
.info-cell:nth-child(odd) { border-right: 1px solid var(--border); }
.ik { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
.iv { color: #fff; font-weight: 600; font-size: 12px; }

#fmt-wrap { display: none; margin-bottom: 16px; }
#fmt-wrap.show { display: block; }
.fmt-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
.fmt-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.fmt-btn {
  padding: 10px 6px; border: 1px solid var(--border); background: var(--surface);
  color: var(--dim); font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.12s; letter-spacing: 0.05em;
}
.fmt-btn:hover { border-color: var(--accent); color: var(--accent); }
.fmt-btn.active { border-color: var(--accent); background: rgba(232,255,0,0.08); color: var(--accent); }
.fmt-btn .ext { display: block; font-size: 15px; margin-bottom: 3px; color: inherit; }
.fmt-btn .desc { font-size: 10px; font-weight: 400; color: var(--dim); }

#convert-btn {
  display: none; width: 100%; padding: 14px; background: var(--accent);
  border: none; color: #000; font-family: var(--font); font-size: 13px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.15s; margin-bottom: 24px;
}
#convert-btn.show { display: block; }
#convert-btn:hover { opacity: 0.88; }
#convert-btn:disabled { opacity: 0.35; cursor: not-allowed; }

#result-wrap { display: none; margin-bottom: 24px; }
#result-wrap.show { display: block; }
#dl-btn {
  display: flex; align-items: center; gap: 16px; padding: 16px 20px;
  border: 1px solid var(--green); background: rgba(0,230,118,0.04);
  cursor: pointer; text-decoration: none; transition: background 0.15s; width: 100%;
}
#dl-btn:hover { background: rgba(0,230,118,0.09); }
.dl-icon { font-size: 24px; }
.dl-text { flex: 1; }
.dl-name { color: #fff; font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.dl-size { color: var(--dim); font-size: 11px; }
.dl-arrow { color: var(--green); font-size: 18px; }

#reset-btn {
  display: none; background: none; border: 1px solid var(--border);
  color: var(--dim); font-family: var(--font); font-size: 12px;
  padding: 8px 16px; cursor: pointer; letter-spacing: 0.08em; transition: all 0.12s;
}
#reset-btn.show { display: block; }
#reset-btn:hover { border-color: var(--dim); color: var(--text); }

#loading {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
#loading.show { display: flex; }
.spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--accent); font-size: 12px; letter-spacing: 0.15em; text-align: center; line-height: 1.8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>RoQ<span>.</span>Extractor</h1>
    <span class="ver">ffmpeg.wasm v0.11</span>
  </header>

  <div id="drop">
    <div class="drop-br"></div>
    <span class="icon">🎬</span>
    <div class="label">Drop a .roq file here</div>
    <div class="hint">or click to browse &nbsp;·&nbsp; id Software RoQ video format</div>
    <input type="file" id="file" accept=".roq,.RoQ">
  </div>

  <div id="log-wrap">
    <div class="log-header"><span>Decoder log</span></div>
    <div id="log"></div>
  </div>
  <div id="prog-wrap"><div id="prog"></div></div>

  <div id="info-wrap"></div>

  <div id="fmt-wrap">
    <div class="fmt-label">Output format</div>
    <div class="fmt-grid">
      <button class="fmt-btn active" data-ext="mp4" data-args="-c:v libx264 -preset fast -crf 20 -c:a aac -movflags +faststart">
        <span class="ext">MP4</span><span class="desc">H.264 · AAC<br>Best compat</span>
      </button>
      <button class="fmt-btn" data-ext="webm" data-args="-c:v libvpx -crf 10 -b:v 0 -c:a libvorbis">
        <span class="ext">WebM</span><span class="desc">VP8 · Vorbis<br>Web native</span>
      </button>
      <button class="fmt-btn" data-ext="avi" data-args="-c:v libx264 -c:a pcm_s16le">
        <span class="ext">AVI</span><span class="desc">H.264 · PCM<br>Classic</span>
      </button>
      <button class="fmt-btn" data-ext="gif" data-args="-vf fps=15,scale=320:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse -loop 0">
        <span class="ext">GIF</span><span class="desc">Animated<br>No audio</span>
      </button>
      <button class="fmt-btn" data-ext="wav" data-args="-vn -c:a pcm_s16le">
        <span class="ext">WAV</span><span class="desc">Audio only<br>Lossless</span>
      </button>
      <button class="fmt-btn" data-ext="mp3" data-args="-vn -c:a libmp3lame -q:a 2">
        <span class="ext">MP3</span><span class="desc">Audio only<br>Compressed</span>
      </button>
      <button class="fmt-btn" data-ext="png" data-args="-frames:v 1">
        <span class="ext">PNG</span><span class="desc">First frame<br>Image</span>
      </button>
      <button class="fmt-btn" data-ext="mov" data-args="-c:v libx264 -c:a aac">
        <span class="ext">MOV</span><span class="desc">QuickTime<br>Apple</span>
      </button>
    </div>
  </div>

  <button id="convert-btn">⚡ Convert</button>

  <div id="result-wrap">
    <a id="dl-btn" href="#" download>
      <span class="dl-icon">📦</span>
      <span class="dl-text">
        <div class="dl-name" id="dl-name">output.mp4</div>
        <div class="dl-size" id="dl-size">–</div>
      </span>
      <span class="dl-arrow">↓</span>
    </a>
  </div>

  <button id="reset-btn">↺ Load another file</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">LOADING FFMPEG.WASM<br><span style="font-size:10px;opacity:0.6">~25 MB · first load only</span></div>
</div>

<script>
// ── Load ffmpeg.wasm via dynamic import from jsdelivr ──────────────────────
// jsdelivr correctly serves the companion worker chunk alongside ffmpeg.min.js

let ffmpegReady = false;
let ffmpeg = null;
let fetchFile = null;

async function loadFFmpegScript() {
  return new Promise((resolve, reject) => {
    if (window.__ffmpegLoaded) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js';
    s.onload  = () => { window.__ffmpegLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Failed to load ffmpeg.min.js from CDN'));
    document.head.appendChild(s);
  });
}

async function initFFmpeg() {
  addLog('Fetching ffmpeg.wasm from CDN…', 'dim');
  loadingEl.classList.add('show');

  try {
    await loadFFmpegScript();

    // After script loads, window.FFmpeg = { createFFmpeg, fetchFile }
    const { createFFmpeg: cFF, fetchFile: fF } = window.FFmpeg;
    fetchFile = fF;

    ffmpeg = cFF({
      log: true,
      corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core-st@0.11.1/dist/ffmpeg-core.js',
      progress: ({ ratio }) => setProgress(ratio),
      logger: ({ message }) => {
        // Show only useful progress lines
        if (/frame=|fps=|time=|speed=/.test(message)) {
          addLog(message.trim(), 'dim');
        }
      }
    });

    await ffmpeg.load();
    ffmpegReady = true;
    addLog('ffmpeg.wasm ready ✓', 'ok');
  } catch (e) {
    addLog('ERROR: ' + e.message, 'err');
    addLog('Check your internet connection — CDN is required.', 'warn');
  }

  loadingEl.classList.remove('show');
}

// ── UI elements ────────────────────────────────────────────────────────────
const dropEl     = document.getElementById('drop');
const fileEl     = document.getElementById('file');
const logWrap    = document.getElementById('log-wrap');
const logEl      = document.getElementById('log');
const progWrap   = document.getElementById('prog-wrap');
const progEl     = document.getElementById('prog');
const infoWrap   = document.getElementById('info-wrap');
const fmtWrap    = document.getElementById('fmt-wrap');
const convertBtn = document.getElementById('convert-btn');
const resultWrap = document.getElementById('result-wrap');
const dlBtn      = document.getElementById('dl-btn');
const dlName     = document.getElementById('dl-name');
const dlSize     = document.getElementById('dl-size');
const resetBtn   = document.getElementById('reset-btn');
const loadingEl  = document.getElementById('loading');

let inputFile = null;
let selectedExt  = 'mp4';
let selectedArgs = '-c:v libx264 -preset fast -crf 20 -c:a aac -movflags +faststart';

// ── Helpers ────────────────────────────────────────────────────────────────
function addLog(msg, cls = 'info') {
  logWrap.classList.add('show');
  const d = document.createElement('div');
  d.className = 'l-' + cls;
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function setProgress(r) {
  progWrap.classList.add('show');
  progEl.style.width = Math.min(100, r * 100).toFixed(1) + '%';
}

function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1048576).toFixed(2) + ' MB';
}

// ── Drop zone ──────────────────────────────────────────────────────────────
dropEl.addEventListener('click', () => fileEl.click());
dropEl.addEventListener('dragover', e => { e.preventDefault(); dropEl.classList.add('over'); });
dropEl.addEventListener('dragleave', () => dropEl.classList.remove('over'));
dropEl.addEventListener('drop', e => {
  e.preventDefault(); dropEl.classList.remove('over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileEl.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.name.match(/\.roq$/i)) {
    addLog('Please select a .roq file', 'err'); return;
  }
  inputFile = file;
  addLog('Loaded: ' + file.name + ' (' + fmtBytes(file.size) + ')', 'ok');

  infoWrap.innerHTML = `
    <div class="info-cell"><span class="ik">File</span><span class="iv">${file.name}</span></div>
    <div class="info-cell"><span class="ik">Size</span><span class="iv">${fmtBytes(file.size)}</span></div>
    <div class="info-cell"><span class="ik">Format</span><span class="iv">id Software RoQ</span></div>
    <div class="info-cell"><span class="ik">Status</span><span class="iv" style="color:var(--green)">Ready</span></div>
  `;
  infoWrap.classList.add('show');
  fmtWrap.classList.add('show');
  convertBtn.classList.add('show');
  resetBtn.classList.add('show');

  // Start loading ffmpeg in background immediately
  if (!ffmpegReady && !ffmpeg) initFFmpeg();
}

// ── Format picker ──────────────────────────────────────────────────────────
document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedExt  = btn.dataset.ext;
    selectedArgs = btn.dataset.args;
  });
});

// ── Convert ────────────────────────────────────────────────────────────────
convertBtn.addEventListener('click', async () => {
  if (!inputFile) return;

  // If ffmpeg isn't ready yet, wait for it
  if (!ffmpegReady) {
    if (!ffmpeg) await initFFmpeg();
    else {
      addLog('ffmpeg is still loading, please wait…', 'warn'); return;
    }
  }
  if (!ffmpegReady) { addLog('ffmpeg failed to load.', 'err'); return; }

  convertBtn.disabled = true;
  resultWrap.classList.remove('show');
  setProgress(0);

  const baseName = inputFile.name.replace(/\.roq$/i, '');
  const outName  = baseName + '.' + selectedExt;

  addLog('Writing input to virtual filesystem…', 'dim');
  try {
    ffmpeg.FS('writeFile', 'input.roq', await fetchFile(inputFile));
  } catch (e) {
    addLog('FS write failed: ' + e.message, 'err');
    convertBtn.disabled = false; return;
  }

  const args = ['-i', 'input.roq', ...selectedArgs.split(' ').filter(Boolean), outName];
  addLog('ffmpeg ' + args.join(' '), 'dim');

  try {
    await ffmpeg.run(...args);
  } catch (e) {
    addLog('Conversion error: ' + e.message, 'err');
    convertBtn.disabled = false; return;
  }

  let data;
  try {
    data = ffmpeg.FS('readFile', outName);
  } catch (e) {
    addLog('Output file not found — conversion may have failed.', 'err');
    convertBtn.disabled = false; return;
  }

  const mime = {
    mp4:'video/mp4', webm:'video/webm', avi:'video/x-msvideo',
    gif:'image/gif', mov:'video/quicktime', wav:'audio/wav',
    mp3:'audio/mpeg', png:'image/png'
  }[selectedExt] || 'application/octet-stream';

  const blob = new Blob([data.buffer], { type: mime });
  const url  = URL.createObjectURL(blob);

  dlBtn.href     = url;
  dlBtn.download = outName;
  dlName.textContent = outName;
  dlSize.textContent = fmtBytes(blob.size) + ' — click to download';
  resultWrap.classList.add('show');
  setProgress(1);
  addLog('Done! ' + outName + ' (' + fmtBytes(blob.size) + ')', 'ok');

  // Cleanup virtual FS
  try { ffmpeg.FS('unlink', 'input.roq'); } catch(_) {}
  try { ffmpeg.FS('unlink', outName);     } catch(_) {}

  convertBtn.disabled = false;
});

resetBtn.addEventListener('click', () => location.reload());
</script>
</body>
</html>
